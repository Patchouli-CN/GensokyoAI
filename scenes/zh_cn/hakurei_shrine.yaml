# 博丽神社
id: hakurei_shrine
name: 博丽神社
description: |
  你正身处博丽神社。这座神社坐落在幻想乡的东端边界，是通往外界的结界所在。
  石阶从山下一路蜿蜒而上，赛钱箱前几乎从不见香客，庭院里落满了红叶。
  这里是幻想乡的人妖聚会之地，时常有人不请自来。
