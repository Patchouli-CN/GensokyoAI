# 记忆配置
memory:
  working_max_turns: 20
  episodic_threshold: 50
  episodic_summary_model: claude-sonnet-4-6-thinking   # 复用主模型做摘要
  episodic_keep_recent: 10
  semantic_enabled: false  # 当前用 Claude 不带 embedding，临时关闭语义记忆；后续接 embedding 后改回 true
  semantic_top_k: 5
  semantic_similarity_threshold: 0.7
  auto_memory_enabled: true
  auto_memory_model: claude-sonnet-4-6-thinking        # 复用主模型写记忆
  
  # 话题生成配置
  topic_generation:
    name_max_length: 10
    summary_max_length: 100

think_engine:
  enabled: true
  think_interval_minutes: 1
  random_walk_steps_min: 2
  random_walk_steps_max: 5
  emotional_trigger_threshold: 0.5
  emotional_priority_probability: 0.7
  think_cooldown_minutes: 10        # 话题被思考后多少分钟内降低再次选中概率
  walk_visit_dedup: true            # 单次随机游走是否避免重复访问同一话题
  think_temperature: 0.7
  think_max_tokens: 200
  initiative_temperature: 0.8
  initiative_max_tokens: 100

# 主动定时器：AI 回复完成后可生成一条积存主动消息和可编辑触发时间
initiative_timer:
  enabled: true
  min_delay_seconds: 30
  max_delay_seconds: 1800
  decision_temperature: 0.4
  decision_max_tokens: 300
  max_initiative_times: 1           # 用户回复后最多连续主动发言次数；达到上限后暂停主动定时器
  max_pending_summary_chars: 240
  allow_frontend_edit_summary: true
  replace_user_modified_timer: true
  expose_pending_summary: true
  hesitation_enabled: false
  hesitation_max_rounds: 2
  hesitation_delay_seconds: auto
  fallback_on_no_schedule: true
  fallback_delay_seconds: 300
  fallback_summary: "稍后自然地重新考虑刚才的对话，若仍有余韵或新想法就主动补充一句。"
  fallback_reason: "AI 未主动设定定时器，系统安排一次自然再考虑以保持角色主动性"

# 工具配置
tool:
  enabled: true
  builtin_tools: ["time", "moon", "memory", "system"] # 内置工具白名单；可加入 "web_search" 开启自有联网搜索工具注入
  custom_tools_path: null
  web_search:
    enabled: false           # 自有 web_search 工具总开关；默认关闭，避免隐私和成本风险
    provider: "ddg"         # ddg / bing / api / mixed；mixed 会合并 ddg 与 API 结果
    max_results: 10
    timeout: 10
    cache_ttl_seconds: 300
    trigger_strategy: "explicit" # off / explicit / auto；仅注入提示引导模型调用工具，不自动联网
    freshness_keywords: ["今天", "今日", "现在", "当前", "最新", "新闻", "价格", "版本", "发布", "更新", "today", "latest", "news", "price", "version"]
    prefer_for_characters: [] # 角色名命中时，引导其优先联网核验
    prefer_for_scenarios: []  # system_contexts 场景关键词命中时，引导联网核验
    user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0 Safari/537.36"
    region: null             # 例如 zh-CN / en-US，用于 Accept-Language
    safe_search: "moderate"  # 预留：off / moderate / strict
    snippet_max_length: 200
    api:
      endpoint: null         # 通用搜索 API endpoint，例如 https://api.tavily.com/search
      method: "POST"         # GET / POST
      api_key: null
      api_key_header: "Authorization"
      api_key_prefix: "Bearer "
      headers: {}
      request_template:
        query: "{query}"
        count: "{max_results}"
      query_params: {}
      results_path: "results"
      title_path: "title"
      url_path: "url"
      snippet_path: "content"
      published_at_path: null

# Runtime 资源控制配置
resource_control:
  enabled: true
  runtime_max_concurrent: 4          # Runtime 入口总并发，覆盖高成本 RPC / stream
  runtime_queue_size: 8              # 资源占满时最多允许等待的请求数；超过后直接返回资源限制错误
  session_max_concurrent: 1          # 单 Runtime 当前会话消息并发；默认保持单会话串行
  provider_max_concurrent: 2         # 预留 Provider 并发上限，阶段五先用于配置与诊断
  stream_max_concurrent: 1           # 流式消息并发上限
  model_max_concurrent: 2            # 模型类动作并发上限
  tool_max_concurrent: 2             # 工具类动作并发上限
  web_search_max_concurrent: 1       # 联网搜索类动作并发上限
  image_generation_max_concurrent: 1 # 图片生成类动作并发上限，当前预留
  dependency_install_max_concurrent: 1 # 依赖安装类动作并发上限
  acquire_timeout_seconds: 0.25      # 排队获取资源的最长等待秒数；reject 策略下建议保持较小
  default_timeout_seconds: 120.0     # Runtime 高成本动作默认总超时预留
  dependency_install_timeout_seconds: 600 # dependency.install 默认安装超时
  overflow_policy: "reject"          # reject / wait；reject 会快速返回结构化资源限制错误

# 会话配置
session:
  auto_save: true
  save_path: ./sessions
  max_sessions: 100
