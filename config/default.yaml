# GensokyoAI 默认配置

# 日志配置
log_level: DEBUG
log_console: false
log_file: "logs/GENSOKYOAI.log"

# 模型配置
model:
  provider: "openai"    # LLM Provider: ollama / openai / openai_responses / gemini / claude
  name: "Pro/zai-org/GLM-5.1"
  base_url: https://api.siliconflow.cn/v1        # null 表示使用默认地址（ollama: http://127.0.0.1:11434）
  api_key: "your-api-key"         # API 密钥（OpenAI/Gemini/Claude 等需要，ollama 不需要）
  stream: true
  think: false
  temperature: 0.7
  top_p: 0.9
  max_tokens: 2048
  timeout: 60
  use_proxy: false      # 是否使用代理，默认不使用，localhost 直连

