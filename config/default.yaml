# GensokyoAI 默认配置
# 当前配置 schema 版本。旧配置可不写该字段；如果写了高于当前支持版本的数字，启动前会报错。
config_schema_version: 1

# 日志配置
log_level: DEBUG
log_console: false
log_file: "logs/GENSOKYOAI.log"

# 静默调试输出：开启后才输出静默思考、内心决策、推理内容等默认隐藏信息
debug_silent_output: false

# 事件追踪日志：开启后输出每个事件的详细投递日志；默认关闭以降低日志噪声
event_trace_enabled: false

# 开启主动场景：主动场景开启后将不在输出默认欢迎语，而是由模型主动对话，关闭则用户触发对话
begin_scene: true

# 主聊天模型配置
model:
  provider: "openai"    # LLM Provider: ollama / openai / openrouter / deepseek / openai_responses / gemini / claude
  name: "claude-sonnet-4-6-thinking"
  base_url: "https://api.lmuai.com/v1"   # 走 lmuai 中转
  api_path: null        # 自定义 API path；OpenAI 默认 /chat/completions，Responses 默认 /responses
  api_key: ""  # 运行时从环境变量 GENSOKYOAI_API_KEY 读取，不要硬编码真实 key
  extra_headers: {}     # 额外 HTTP 请求头；OpenRouter 可配置 HTTP-Referer / X-Title
  web_search_enabled: false      # Web search 总开关；默认 false，避免隐私和成本风险
  web_search_strategy: "off"     # off / explicit / auto；当前执行层仅在 enabled 且非 off 时注入 Provider 内置搜索
  web_search_context_size: null   # OpenAI Responses web_search_preview 可选：low / medium / high
  web_search_user_location: {}    # OpenAI Responses 可选用户位置，如 {type: approximate, country: US}
  web_search_allow_fallback: true # 搜索不可用时允许降级为普通回答
  web_search_metadata: {}         # Provider 特定搜索参数扩展
  stream: true
  think: true                                  # 打开 thinking,匹配 claude-sonnet-4-6-thinking
  thinking_enabled: null # DeepSeek 专用；null 表示使用 Provider 默认值（DeepSeek 默认 true）
  reasoning_effort: "high" # Claude thinking 模型透传(OpenAI 兼容 SDK 会走 extra_body)
  temperature: 0.7
  top_p: 0.9
  max_tokens: 2048
  timeout: 60
  use_proxy: false      # 是否使用代理，默认不使用，localhost 直连
  retry_max_attempts: 3       # 仅对 retry_status_codes 中的临时错误自动重试
  retry_initial_delay: 1.0    # 首次重试前等待秒数
  retry_backoff_factor: 2.0   # 指数退避倍率
  retry_status_codes: [500, 502, 503, 504] # 默认仅重试临时服务端错误；如需重试 429 可显式加入

# Embedding 模型配置（独立于主聊天模型，避免误用聊天模型调用 embeddings）
# Claude 原生不支持 embeddings；当前用 claude-sonnet-4-6-thinking，先禁用语义记忆以免启动报错。
# 如需恢复语义记忆，可改成 OpenAI 兼容的 embedding 模型（参照下方示例）。
embedding:
  provider: null        # null 表示默认复用 model.provider；Claude 不支持 embeddings，需改用 openai/gemini/ollama 等
  name: null            # 例如 text-embedding-3-small / BAAI/bge-m3 / nomic-embed-text / gemini-embedding-001
  base_url: null        # null 表示复用 model.base_url
  api_key: null         # null 表示复用 model.api_key
  dimensions: null      # OpenAI text-embedding-3-* 支持缩短维度
  encoding_format: null # OpenAI 支持 float / base64
  timeout: null         # null 表示复用 model.timeout
  use_proxy: null       # null 表示复用 model.use_proxy

# --- 备用：如果想恢复语义记忆，启用一个 OpenAI 兼容 embedding 服务 ---
