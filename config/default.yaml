# GensokyoAI 默认配置

# 日志配置
log_level: DEBUG
log_console: false
log_file: "logs/GENSOKYOAI.log"

# 模型配置
model:
  name: "qwen3.5:9b"
  base_url: null  # null 表示使用默认 http://127.0.0.1:11434
  stream: true
  think: false
  temperature: 0.7
  top_p: 0.9
  max_tokens: 2048
  timeout: 60
  use_proxy: false  # 🆕 默认不使用代理，localhost 直连

# 记忆配置
memory:
  working_max_turns: 20
  episodic_threshold: 50
  episodic_summary_model: qwen3.5:9b
  episodic_keep_recent: 10
  semantic_enabled: true
  semantic_top_k: 5
  semantic_similarity_threshold: 0.7
  auto_memory_enabled: true
  auto_memory_model: qwen3.5:9b
  
  # 🆕 话题生成配置
  topic_generation:
    name_max_length: 10
    summary_max_length: 100
    examples:
      - input: "用户介绍了自己叫君羽"
        name: "君羽的初次来访"
      - input: "讨论了幽幽子喜欢吃什么点心"
        name: "幽幽子的点心偏好"
      - input: "约定了下次一起赏樱"
        name: "赏樱的约定"

# 工具配置
tool:
  enabled: true
  custom_tools_path: null

# 会话配置
session:
  auto_save: true
  save_path: ./sessions
  max_sessions: 100